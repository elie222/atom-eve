name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate registry
        run: pnpm generate

      - name: Verify generated files are committed
        run: git diff --exit-code -- registry.json public/index.json public/r

      - name: Typecheck and build
        run: pnpm typecheck && pnpm build

      - name: Verify fixture installs
        run: pnpm verify:fixtures

      - name: Secret scan
        run: pnpm secret-scan

      - name: Pack CLI
        run: pnpm --dir packages/cli pack --pack-destination /tmp/atom-eve-pack
